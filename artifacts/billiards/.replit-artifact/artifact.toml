kind = "web"
previewPath = "/"
title = "Quản Lý Bàn Bi-a"
version = "1.0.0"
id = "artifacts/billiards"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21217

[services.development]
run = "pnpm --filter @workspace/billiards run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/billiards", "run", "build" ]
publicDir = "artifacts/billiards/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21217"
BASE_PATH = "/"
