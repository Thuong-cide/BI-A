services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: billiards
      POSTGRES_USER: billiards
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-billiards_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billiards -d billiards"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://billiards:${POSTGRES_PASSWORD:-billiards_pass}@postgres:5432/billiards
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://billiards:${POSTGRES_PASSWORD:-billiards_pass}@postgres:5432/billiards
      JWT_SECRET: ${JWT_SECRET:-billiards-secret-change-me}
      PORT: 8080
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
